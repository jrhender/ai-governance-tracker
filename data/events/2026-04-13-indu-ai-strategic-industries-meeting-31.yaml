description: >
  Meeting 31 of the Standing Committee on Industry and Technology (INDU) as part
  of its study on "Opportunities, Risks, and Regulation of AI in Canada's Strategic
  Industries." The session ran from 3:32 p.m. to 5:43 p.m. EDT and was televised.
  Witnesses represented Bell Canada, Bell AI, the Vector Institute, Cohere Inc.,
  TELUS, and Next Generation Manufacturing Canada, discussing AI regulation and
  its implications for Canadian industry.

