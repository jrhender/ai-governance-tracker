description: >
  Summary report from the AI National Security Scenarios Workshop co-hosted
  by the Global AI Risks Initiative at CIGI and the Privy Council Office of
  Canada. Contains policy recommendations intended to stimulate discussion
  among policy makers and the broader public on national security implications
  of next-generation AI systems. The report covers five possible future AI
  scenarios (to 2030), an executive summary of key messages drawn from workshop
  discussions and background literature, and an appendix summarizing key points
  from the workshop discussion.

