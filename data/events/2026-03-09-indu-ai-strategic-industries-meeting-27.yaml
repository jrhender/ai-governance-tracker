description: >
  Meeting 27 of the Standing Committee on Industry and Technology (INDU) as part
  of its study on "Opportunities, Risks, and Regulation of AI in Canada's Strategic
  Industries." The public session ran from 3:41 p.m. to 5:32 p.m. EDT (5:20 p.m.
  for public witnesses, followed by an in-camera session on a separate matter) and
  was webcast. Witnesses included academics and industry representatives covering
  AI governance, AI safety, computer vision, information law, and applied AI, as
  well as the CEO of Scale AI and the founder of AI Governance and Safety Canada.

