title: "Canada-Finland Joint Statement on Sovereign Technology and AI Cooperation"
published_date: 2026-04-14

organizations:
  - id: ised-canada
    role: publisher

description: >
  Joint statement issued by Prime Minister Mark Carney and President of Finland
  Alexander Stubb following meetings in Ottawa on April 14, 2026. The statement
  sets out a new phase of bilateral cooperation covering sovereign technology,
  artificial intelligence, high-performance computing, quantum research, Arctic
  and maritime issues, and defence. The two countries noted their existing
  cooperation through multilateral fora including the Organisation for Economic
  Co-operation and Development (OECD) and the Global Partnership on Artificial
  Intelligence (GPAI), and committed to deepen direct bilateral collaboration.

  On the technology side, Canada and Finland agreed to: expand AI compute
  capacity and promote sustainable digital infrastructure; explore collaboration
  on frontier AI models with safety and responsibility as foundational design
  principles; foster AI and technology adoption across industry and government;
  advance quantum research, innovation, commercialization, and workforce
  development; and cooperate on telecommunications technologies. Finland's
  participation in the Sovereign Technology Alliance — a partnership framework
  launched by Canada and Germany in February 2026 to strengthen sovereign AI
  capacity and reduce reliance on external technology providers — is also to be
  explored. A memorandum of understanding between Export Development Canada and
  Nokia to support AI gigafactory development was noted.

  The broader bilateral statement also covers: establishing a Canada–Finland
  Maritime Memorandum of Understanding; launching negotiations on a General
  Security of Information Agreement; cooperating under the ICE Pact
  (Icebreaker Collaboration Effort); and linking technology cooperation to
  critical minerals and trusted supply chains.

