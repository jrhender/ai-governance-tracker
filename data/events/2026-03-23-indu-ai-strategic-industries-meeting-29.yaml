description: >
  Meeting 29 of the Standing Committee on Industry and Technology (INDU) as part
  of its study on "Opportunities, Risks, and Regulation of AI in Canada's Strategic
  Industries." The session ran from 3:32 p.m. to 5:51 p.m. EDT and was webcast.
  Witnesses appeared as individuals or on behalf of the University of Guelph,
  covering AI law, privacy, copyright, and cybersecurity — including prominent AI
  researcher Yoshua Bengio, law professor Michael Geist, and privacy scholar Colin Bennett.

